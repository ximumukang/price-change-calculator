spring:
  datasource:
    url: jdbc:mysql://localhost:3306/price_change?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

jwt:
  secret: price-change-secret-key-for-jwt-token-generation-must-be-at-least-256-bits
  expiration: 7200000

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
